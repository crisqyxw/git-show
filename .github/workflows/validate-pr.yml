name: Validate Contribution

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行贡献验证并保存结果
        id: validate
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_DESCRIPTION: ${{ github.event.pull_request.body }}
        run: |
          python scripts/validate_contribution.py --format json > /tmp/result.json
          echo "success=$(python3 -c "import json;print(json.load(open('/tmp/result.json'))['success'])" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 发布验证评论到 PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "$(python3 -c "import json; print(json.load(open('/tmp/result.json'))['markdown'])")" \
            --edit-last

      - name: 设置检查状态
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${{ steps.validate.outputs.success }}" = "true" ]; then
            conclusion="success"
            summary="所有检查通过"
          else
            conclusion="failure"
            summary="存在未通过的检查项，请查看 PR 评论了解详情"
          fi
          gh api "/repos/${{ github.repository }}/check-runs" \
            --method POST \
            --field name="CONTRIBUTING.md 合规检查" \
            --field head_sha="$SHA" \
            --field status="completed" \
            --field conclusion="$conclusion" \
            --field output="{\"title\":\"贡献验证结果\",\"summary\":\"$summary\"}"
